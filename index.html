<!DOCTYPE html>
<html lang="fa" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>VLESS Generator - با لیست دامنه</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 750px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.1);
            padding: 24px 28px;
        }
        h1 {
            font-size: 1.7rem;
            margin: 0 0 8px 0;
            color: #1e2a3e;
        }
        .sub {
            color: #5b6e8c;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 16px;
            margin-bottom: 24px;
            font-size: 0.9rem;
        }
        .field-group {
            margin-bottom: 18px;
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: 600;
            margin-bottom: 6px;
            color: #1e293b;
            font-size: 0.85rem;
        }
        input, textarea {
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            padding: 10px 16px;
            font-size: 0.9rem;
            transition: 0.2s;
            outline: none;
            font-family: monospace;
        }
        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }
        /* حاشیه قرمز برای فیلد فعال (مشابه Shape در دلفی) */
        .active-edit {
            border: 2px solid #ef4444 !important;
            background-color: #fff5f5;
            box-shadow: 0 0 0 2px rgba(239,68,68,0.2);
        }
        .row-2 {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .row-2 .field-group {
            flex: 1;
        }
        button {
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 12px 20px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            margin-top: 8px;
        }
        button:hover {
            background: #dc2626;
            transform: scale(0.98);
        }
        .copy-btn {
            background: #3b82f6;
            margin-top: 12px;
        }
        .copy-btn:hover {
            background: #2563eb;
        }
        .result-area {
            margin-top: 28px;
            background: #f1f5f9;
            border-radius: 20px;
            padding: 16px;
            border: 1px solid #e2e8f0;
        }
        .result-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: bold;
            color: #475569;
            margin-bottom: 10px;
        }
        #generatedLink {
            background: #0f172a;
            color: #a5f3fc;
            font-family: monospace;
            font-size: 0.75rem;
            word-break: break-all;
            padding: 12px;
            border-radius: 16px;
            border: none;
            width: 100%;
            resize: vertical;
        }
        .status {
            font-size: 0.75rem;
            margin-top: 10px;
            text-align: center;
            color: #2b6e3c;
        }
        /* لیست دامنه ها (snilis) */
        .snilis-section {
            margin: 20px 0 10px;
            background: #f8fafc;
            border-radius: 20px;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
        }
        .snilis-title {
            font-size: 0.75rem;
            font-weight: bold;
            color: #334155;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .snilis-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .snilis-item {
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 0.8rem;
            font-family: monospace;
            cursor: pointer;
            transition: 0.2s;
            color: #1e293b;
        }
        .snilis-item:hover {
            background: #e2e8f0;
            border-color: #ef4444;
            transform: scale(0.96);
        }
        .footer-note {
            font-size: 0.7rem;
            text-align: center;
            color: #64748b;
            margin-top: 20px;
        }
        hr {
            margin: 16px 0;
        }
        @media (max-width: 550px) {
            .container { padding: 18px; }
            .row-2 { flex-direction: column; gap: 0; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔐 VLESS Generator</h1>
    <div class="sub">ساخت کانفیگ + لیست دامنه‌های پرکاربرد</div>

    <div class="field-group">
        <label>UUID</label>
        <input type="text" id="uuid" placeholder="00000000-0000-0000-0000-000000000000" value="cddd81ca-387e-4974-8f38-9cf24f31cb6e">
    </div>

    <div class="row-2">
        <div class="field-group">
            <label>Address 1 (آدرس سرور)</label>
            <input type="text" id="addr1" class="addr-input" placeholder="kubernetes.io" value="kubernetes.io">
        </div>
        <div class="field-group">
            <label>Address 2 (SNI)</label>
            <input type="text" id="addr2" class="addr-input" placeholder="kubernetes.io" value="kubernetes.io">
        </div>
    </div>

    <div class="row-2">
        <div class="field-group">
            <label>Host (میزبان)</label>
            <input type="text" id="host" placeholder="netlify.app / custom" value="zesty-cocada-a5f874.netlify.app">
        </div>
        <div class="field-group">
            <label>Path (مسیر)</label>
            <input type="text" id="path" placeholder="/yourpath" value="/yourpath">
        </div>
    </div>

    <div class="field-group">
        <label>Name (برچسب انتهای لینک)</label>
        <input type="text" id="name" placeholder="my-config" value="01-test">
    </div>

    <!-- بخش snilis (لیست دامنه‌ها) -->
    <div class="snilis-section">
        <div class="snilis-title">
            📋 لیست دامنه‌های سریع (snilis)
            <span style="font-size:0.7rem; font-weight:normal;">کلیک کنید تا در فیلد فعال (با حاشیه قرمز) قرار گیرد</span>
        </div>
        <div class="snilis-list" id="snilisContainer">
            <!-- مقادیر توسط JS درج می‌شوند -->
        </div>
    </div>

    <button id="generateBtn">✨ تولید لینک & کپی در کلیپ‌بورد</button>
    <button id="copyOnlyBtn" class="copy-btn">📋 فقط کپی لینک فعلی</button>

    <div class="result-area">
        <div class="result-label">➤ VLESS LINK (قابل استفاده در کلاینت)</div>
        <textarea id="generatedLink" rows="3" readonly placeholder="لینک ساخته شده اینجا نمایش داده می‌شود..."></textarea>
        <div id="statusMsg" class="status"></div>
    </div>
    <div class="footer-note">
        ✅ با کلیک روی هر دامنه، مقدار آن در فیلد فعال (قرمز) جایگزین می‌شود • ذخیره خودکار در مرورگر
    </div>
</div>

<script>
    // لیست مقادیر snilis (مطابق دلفی)
    const snilisValues = [
        "kubernetes.io",
        "helm.sh",
        "letsencrypt.org",
        "docs.helm.sh",
        "kubectl.docs.kubernetes.io",
        "blog.helm.sh",
        "kind.sigs.k8s.io",
        "cluster-api.sigs.k8s.io",
        "krew.sigs.k8s.io",
        "gateway-api.sigs.k8s.io",
        "scheduler-plugins.sigs.k8s.io",
        "kustomize.sigs.k8s.io",
        "image-builder.sigs.k8s.io"
    ];

    // --- عناصر DOM ---
    const uuidInput = document.getElementById('uuid');
    const addr1Input = document.getElementById('addr1');
    const addr2Input = document.getElementById('addr2');
    const hostInput = document.getElementById('host');
    const pathInput = document.getElementById('path');
    const nameInput = document.getElementById('name');
    const outputTextarea = document.getElementById('generatedLink');
    const statusDiv = document.getElementById('statusMsg');
    const snilisContainer = document.getElementById('snilisContainer');

    // --- مدیریت فیلد فعال (حاشیه قرمز) ---
    let activeEdit = null;  // نگهداری فیلدی که در حال حاضر حاشیه قرمز دارد

    // حذف حاشیه قرمز از همه فیلدهای ورودی (addr1 و addr2)
    function removeActiveBorder() {
        const addrInputs = document.querySelectorAll('.addr-input');
        addrInputs.forEach(inp => {
            inp.classList.remove('active-edit');
        });
    }

    // تنظیم حاشیه قرمز روی فیلد انتخاب شده
    function setActiveEdit(editElement) {
        removeActiveBorder();
        if (editElement && (editElement.id === 'addr1' || editElement.id === 'addr2')) {
            editElement.classList.add('active-edit');
            activeEdit = editElement;
        } else {
            activeEdit = null;
        }
    }

    // رویداد کلیک روی فیلدهای addr1 و addr2
    addr1Input.addEventListener('click', () => setActiveEdit(addr1Input));
    addr2Input.addEventListener('click', () => setActiveEdit(addr2Input));

    // (اختیاری) در صورت کلیک روی سایر فیلدها، حاشیه قرمز غیرفعال شود
    const otherInputs = [uuidInput, hostInput, pathInput, nameInput];
    otherInputs.forEach(inp => {
        inp.addEventListener('click', () => {
            removeActiveBorder();
            activeEdit = null;
        });
    });

    // --- پر کردن لیست snilis به صورت دکمه‌های قابل کلیک ---
    function buildSnilisList() {
        snilisContainer.innerHTML = '';
        snilisValues.forEach(domain => {
            const span = document.createElement('span');
            span.className = 'snilis-item';
            span.textContent = domain;
            span.addEventListener('click', () => {
                if (activeEdit) {
                    activeEdit.value = domain;
                    // ذخیره خودکار بعد از تغییر
                    saveToLocalStorage();
                    // پیام کوتاه
                    statusDiv.innerText = `✅ مقدار "${domain}" در فیلد ${activeEdit.id} قرار گرفت.`;
                    setTimeout(() => {
                        if (statusDiv.innerText.includes("قرار گرفت")) statusDiv.innerText = "";
                    }, 1500);
                    // همچنین می‌توان لینک را به‌روز کرد (اختیاری)
                    updateOutputLinkWithoutCopy();
                } else {
                    statusDiv.innerText = "⚠️ ابتدا روی فیلد Address 1 یا Address 2 کلیک کنید (حاشیه قرمز شود).";
                    setTimeout(() => {
                        if (statusDiv.innerText.includes("ابتدا")) statusDiv.innerText = "";
                    }, 2000);
                }
            });
            snilisContainer.appendChild(span);
        });
    }

    // --- ذخیره در localStorage ---
    function saveToLocalStorage() {
        const config = {
            uuid: uuidInput.value,
            addr1: addr1Input.value,
            addr2: addr2Input.value,
            host: hostInput.value,
            path: pathInput.value,
            name: nameInput.value
        };
        localStorage.setItem('vless_config', JSON.stringify(config));
    }

    // بارگذاری از localStorage
    function loadFromLocalStorage() {
        const saved = localStorage.getItem('vless_config');
        if (!saved) return;
        try {
            const cfg = JSON.parse(saved);
            if (cfg.uuid !== undefined) uuidInput.value = cfg.uuid;
            if (cfg.addr1 !== undefined) addr1Input.value = cfg.addr1;
            if (cfg.addr2 !== undefined) addr2Input.value = cfg.addr2;
            if (cfg.host !== undefined) hostInput.value = cfg.host;
            if (cfg.path !== undefined) pathInput.value = cfg.path;
            if (cfg.name !== undefined) nameInput.value = cfg.name;
        } catch(e) { console.warn(e); }
    }

    // --- ساخت لینک VLESS (مشابه دلفی) ---
    function buildVlessLink() {
        let uuid = uuidInput.value.trim();
        let addr1 = addr1Input.value.trim();
        let addr2 = addr2Input.value.trim();
        let host = hostInput.value.trim();
        let rawPath = pathInput.value.trim();
        let name = nameInput.value.trim();

        if (!uuid) uuid = "00000000-0000-0000-0000-000000000000";
        if (!addr1) addr1 = "kubernetes.io";
        if (!addr2) addr2 = addr1;
        if (!host) host = addr1;
        if (!rawPath) rawPath = "/";
        if (!name) name = "config";

        const encodedPath = encodeURIComponent(rawPath);
        const extraEncoded = "%7B%22xPaddingBytes%22%3A%221-1%22%7D"; // {"xPaddingBytes":"1-1"}

        const link = `vless://${uuid}@${addr1}:443?mode=auto&path=${encodedPath}&security=tls&alpn=h2%2Chttp%2F1.1&encryption=none&extra=${extraEncoded}&insecure=0&host=${host}&fp=chrome&type=xhttp&allowInsecure=0&sni=${addr2}#${name}`;
        return link;
    }

    // به‌روزرسانی textarea بدون کپی (برای پیش‌نمایش)
    function updateOutputLinkWithoutCopy() {
        const link = buildVlessLink();
        outputTextarea.value = link;
    }

    // تولید و کپی به کلیپ‌بورد
    async function generateAndCopy(showMessage = true) {
        const link = buildVlessLink();
        outputTextarea.value = link;
        try {
            await navigator.clipboard.writeText(link);
            if (showMessage) {
                statusDiv.innerText = "✅ کانفیگ ساخته شد و در کلیپ‌بورد کپی گردید!";
                setTimeout(() => {
                    if (statusDiv.innerText.includes("کپی گردید")) statusDiv.innerText = "";
                }, 2800);
            }
        } catch (err) {
            statusDiv.innerText = "❌ خطا در کپی خودکار. لطفاً دستی کپی کنید.";
            outputTextarea.select();
        }
        saveToLocalStorage();
    }

    // فقط کپی لینک موجود در textarea
    async function copyExistingLink() {
        const existing = outputTextarea.value;
        if (!existing) {
            statusDiv.innerText = "⚠️ ابتدا لینکی تولید کنید.";
            return;
        }
        try {
            await navigator.clipboard.writeText(existing);
            statusDiv.innerText = "📋 لینک موجود کپی شد!";
            setTimeout(() => {
                if (statusDiv.innerText.includes("کپی شد")) statusDiv.innerText = "";
            }, 2000);
        } catch(e) {
            statusDiv.innerText = "❌ کپی نشد، دستی کپی کنید.";
            outputTextarea.select();
        }
    }

    // --- اتصال رویدادها برای ذخیره خودکار و بروزرسانی لینک ---
    function bindAutoSaveAndPreview() {
        const allInputs = [uuidInput, addr1Input, addr2Input, hostInput, pathInput, nameInput];
        allInputs.forEach(inp => {
            inp.addEventListener('input', () => {
                saveToLocalStorage();
                updateOutputLinkWithoutCopy();
            });
        });
    }

    // --- مقداردهی اولیه ---
    function init() {
        loadFromLocalStorage();
        buildSnilisList();
        bindAutoSaveAndPreview();
        updateOutputLinkWithoutCopy();

        // دکمه‌ها
        document.getElementById('generateBtn').addEventListener('click', () => generateAndCopy(true));
        document.getElementById('copyOnlyBtn').addEventListener('click', copyExistingLink);

        // در ابتدا هیچ فیلدی active نباشد، ولی اگر خواستید اولین فیلد پیش‌فرض داشته باشد:
        // setActiveEdit(addr1Input);
    }

    init();
</script>
</body>
</html>
